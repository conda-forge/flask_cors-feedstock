{% set name = "Flask-Cors" %}
{% set pname = "flask_cors" %}
{% set version = "6.0.0" %}

package:
  name: {{ pname|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') | lower }}-{{ version }}.tar.gz
  sha256: 4592c1570246bf7beee96b74bc0adbbfcb1b0318f6ba05c412e8909eceec3393

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.6
    - pip
  run:
    - python >=3.6
    - flask >=0.9
    - six

test:
  imports:
    - flask_cors

about:
  license: MIT
  home: https://github.com/corydolphin/flask-cors
  license_file: LICENSE
  license_family: MIT
  summary: Cross Origin Resource Sharing ( CORS ) support for Flask

  description: |
    A Flask extension for handling Cross Origin Resource Sharing (CORS), making cross-origin AJAX possible.
  doc_url: http://flask-cors.corydolphin.com/en/latest/
  dev_url: https://github.com/corydolphin/flask-cors

extra:
  recipe-maintainers:
    - knaaptime
